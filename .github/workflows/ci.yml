name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test -- --reporter=default
        env:
          NODE_ENV: test
          ADMIN_PASSWORD: '123456'
          JWT_SECRET: 'test-secret'

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: drone-uploader:ci
          load: true

      - name: Smoke test container
        run: |
          docker run -d --name drone-uploader-ci -p 15000:3001 \
            -e ADMIN_PASSWORD=123456 \
            drone-uploader:ci
          sleep 5
          curl -fsS http://127.0.0.1:15000/api/health | grep -q '"success":true'
          docker rm -f drone-uploader-ci
